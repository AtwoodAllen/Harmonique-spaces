<!-- ===== PROCESS ===== -->
<section class="process" id="process">
  <div class="section-header reveal">
    <p class="section-eyebrow">How We Work</p>
    <h2 class="section-title">A process as <em>thoughtful</em> as the result</h2>
  </div>
  <div class="process-steps">
    <div class="step reveal reveal-delay-1">
      <div class="step-dot">I</div>
      <h4 class="step-title">Discovery</h4>
      <p class="step-desc">We listen. We learn your lifestyle, tastes, and aspirations to build a vision that's truly yours.</p>
    </div>
    <div class="step reveal reveal-delay-2">
      <div class="step-dot">II</div>
      <h4 class="step-title">Concept</h4>
      <p class="step-desc">Mood boards, spatial plans, and material palettes are crafted and refined until everything clicks.</p>
    </div>
    <div class="step reveal reveal-delay-3">
      <div class="step-dot">III</div>
      <h4 class="step-title">Execution</h4>
      <p class="step-desc">Our team manages every detail with precision — procurement, installation, and on-site coordination.</p>
    </div>
    <div class="step reveal reveal-delay-4">
      <div class="step-dot">IV</div>
      <h4 class="step-title">Reveal</h4>
      <p class="step-desc">We hand over a space that feels ready and right — and follow up to ensure it stays that way.</p>
    </div>
  </div>
</section>

<!-- ===== CONTACT ===== -->
<section class="contact" id="contact">
  <div class="reveal">
    <p class="section-eyebrow">Let's Talk</p>
    <h2 class="section-title" style="max-width:380px;">Start your <em>transformation</em> today</h2>
    <p style="font-size:0.9rem;font-weight:300;line-height:1.9;color:#8B6E52;margin-top:1.5rem;max-width:360px;">
      Whether you have a clear vision or just a feeling — reach out. Our initial consultations are always complimentary.
    </p>
    <div style="margin-top:2.5rem;display:flex;flex-direction:column;gap:1rem;">
      <p class="contact-info-item">✦ &nbsp;info@harmoniquespaces.com</p>
      <p class="contact-info-item">✦ &nbsp;+234 800 000 0000</p>
      <p class="contact-info-item">✦ &nbsp;Lagos &middot; Abuja &middot; Accra</p>
    </div>
  </div>
  <form class="contact-form reveal" id="contactForm">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="firstName">First Name</label>
        <input class="form-input" type="text" id="firstName" placeholder="Your name" required/>
      </div>
      <div class="form-group">
        <label class="form-label" for="lastName">Last Name</label>
        <input class="form-input" type="text" id="lastName" placeholder="Your surname" required/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-input" type="email" id="email" placeholder="your@email.com" required/>
    </div>
    <div class="form-group">
      <label class="form-label" for="service">Service Interest</label>
      <select class="form-select" id="service">
        <option value="" disabled selected>Select a service</option>
        <option>Interior Design</option>
        <option>Space Decoration</option>
        <option>Event Planning</option>
        <option>Full Package</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="message">Tell Us More</label>
      <textarea class="form-textarea" id="message" placeholder="Share your vision or project details…"></textarea>
    </div>
    <button type="submit" class="btn-primary" style="align-self:flex-start;margin-top:0.5rem;">Send Enquiry</button>
    <p id="formMsg" style="font-size:0.8rem;color:#8A9E8B;margin-top:0.5rem;display:none;">
      ✓ Message sent! We'll be in touch within 24 hours.
    </p>
  </form>
</section>
